<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeLink AI Chatbot</title>

    <link rel="stylesheet" href="css/chatbot.css">
</head>
<body>

<div class="chat-container">

    <div class="chat-header">
        🤖 SafeLink AI Assistant
    </div>

    <div id="chatBox" class="chat-box">

        <div class="bot-message">
    👋 Welcome to <b>SafeLink AI</b>!

    <br><br>

    I'm your personal safety assistant.

    <br><br>

    I can help you with:
    <br>🚨 Emergency guidance
    <br>🩹 First aid information
    <br>🛡 Personal safety tips
    <br>📍 SafeLink features
    <br>✈ Travel safety
    <br>💬 General safety questions

    <br><br>

    <i>How can I help you today?</i>
</div>

    </div>

    <div class="input-area">
        <input
            type="text"
            id="userInput"
            placeholder="Type your question..."
        >

        <button onclick="sendMessage()">Send</button>
    </div>

</div>

<script src="js/chatbot.js"></script>

</body>
</html>
