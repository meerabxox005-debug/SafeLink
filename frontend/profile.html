<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeLink - Profile</title>

    <link rel="stylesheet" href="./css/style.css">
</head>

<body>

<header class="navbar">
    <h2>My Profile</h2>
    <a href="dashboard.html">⬅ Back</a>
</header>

<div class="container">

    <div class="profile-card">

        <div class="profile-avatar">
            👤
        </div>

        <h2>Meerab</h2>
        <p>meerab@email.com</p>

    </div>

    <h3>Personal Information</h3>

    <input type="text" placeholder="Full Name" value="Meerab">

    <input type="email" placeholder="Email">

    <input type="tel" placeholder="Phone Number">

    <input type="text" placeholder="Blood Group">

    <textarea placeholder="Medical Information"></textarea>

    <button class="btn">
        Save Changes
    </button>

</div>

<div class="container">

    <h3>Settings</h3>

    <div class="card">🔐 Privacy Settings</div>

    <div class="card">🔔 Notification Settings</div>

    <div class="card">❓ Help & Support</div>

    <div class="card">🚪 Logout</div>

</div>

<script src="js/config.js"></script>
<script src="./js/profile.js"></script>

</body>
</html>
